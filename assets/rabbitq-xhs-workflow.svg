    <rect x="28" y="220" width="254" height="1" fill="#e1e8df"/>
    <text x="28" y="260" fill="#27322c" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif" font-size="19">• 单个 .md 文件</text>
    <text x="28" y="298" fill="#27322c" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif" font-size="19">• Markdown + 附件目录</text>
    <text x="28" y="336" fill="#27322c" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif" font-size="19">• 完整飞书 ZIP 包</text>
    <text x="28" y="380" fill="#8a5b1f" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif" font-size="17">视频跳过并提示</text>
