    <text x="28" y="298" fill="#27322c" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif" font-size="19">图片裁剪 · 缩放 · 并排</text>
    <text x="28" y="336" fill="#27322c" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif" font-size="19">草稿保存 · 一键复原</text>
