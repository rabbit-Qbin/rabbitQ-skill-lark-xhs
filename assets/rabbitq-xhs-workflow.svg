    <rect x="88" y="27" width="54" height="66" rx="4" fill="#f4faf3" stroke="#5fa66a" stroke-width="3"/>
    <path d="M101 46h28M101 59h28M101 72h19" stroke="#5fa66a" stroke-width="3" stroke-linecap="round"/>
    <rect x="151" y="49" width="68" height="52" rx="4" fill="#eef4fd" stroke="#4d7fd2" stroke-width="3"/>
    <path d="M160 88l17-17 12 12 10-9 11 14" fill="none" stroke="#4d7fd2" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
