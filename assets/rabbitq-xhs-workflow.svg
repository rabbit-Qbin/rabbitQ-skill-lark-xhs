<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">rabbitQ 飞书 Markdown 转小红书图文工作流</title>
  <desc id="desc">从飞书导出 Markdown 和图片附件，经过结构解析与连续分页，在本地 Studio 编辑，最后保存 HTML 或导出 3 比 4 PNG。</desc>
  <rect width="1600" height="900" fill="#f3f6f1"/>
  <rect x="52" y="48" width="1496" height="804" rx="8" fill="#fffdf8" stroke="#dce5da" stroke-width="2"/>

  <text x="82" y="112" fill="#171c1a" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Noto Sans CJK SC',sans-serif" font-size="42" font-weight="800">飞书 Markdown → 小红书 3:4 图文 Studio</text>
  <text x="84" y="154" fill="#526057" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Noto Sans CJK SC',sans-serif" font-size="22">本地解析、连续分页、自由编辑、批量导出</text>
